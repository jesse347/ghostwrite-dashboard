<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ghostladder · price guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ghostladder.css">
<style>
:root {
  --bg: #0a0a0a;
  --surf1: #111111;
  --surf2: #181818;
  --border2: #1a1a1a;
  --body: 'DM Sans', sans-serif;
  --flag-red: #ff4040;
}

body { font-family: var(--body); }

/* ── Header ─────────────────────────────────────────────────────────────────── */

/* ── Page layout ─────────────────────────────────────────────────────────────── */
.page { display: flex; height: calc(100vh - 56px); overflow: hidden; }

/* ── Left: product table ─────────────────────────────────────────────────────── */
.product-list {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  transition: flex 0.25s ease;
}
.product-list.drawer-open { flex: 0 0 55%; }

/* ── Filters ─────────────────────────────────────────────────────────────────── */
.filter-row {
  display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-row input {
  background: var(--surf1); border: 1px solid var(--border); color: var(--text);
  font-family: var(--display); font-size: 11px; padding: 7px 12px; border-radius: 3px;
  width: 220px; outline: none;
}
.filter-row input::placeholder { color: var(--muted2); }
.filter-row input:focus { border-color: var(--accent); }
.chip {
  background: var(--surf1); border: 1px solid var(--border); color: var(--muted);
  font-family: var(--display); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 10px 20px; border-radius: 2px; cursor: pointer; transition: all 0.15s;
}
.chip:hover { color: var(--text); border-color: var(--muted); }
.chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
.result-count { color: var(--muted); font-family: var(--display); font-size: 10px; margin-left: auto; }

/* ── Product table ───────────────────────────────────────────────────────────── */
.guide-table { width: 100%; border-collapse: collapse; }
.guide-table thead th {
  font-family: var(--display); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); text-align: left; padding: 0 12px 10px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
.guide-table thead th:hover { color: var(--text); }
.guide-table thead th.sort-asc::after { content: ' ▲'; color: var(--accent); }
.guide-table thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }
.guide-table tbody tr {
  border-bottom: 1px solid var(--border2); cursor: pointer; transition: background 0.1s;
}
.guide-table tbody tr:hover { background: var(--surf1); }
.guide-table tbody tr.selected { background: var(--surf2); border-left: 2px solid var(--accent); }
.guide-table td {
  padding: 10px 12px 10px 0; font-size: 13px; color: var(--muted2); vertical-align: middle;
}
.td-player { color: var(--text) !important; font-weight: 500; }
.td-set { font-size: 11px; color: var(--muted) !important; letter-spacing: 0.5px; }
.td-price { font-family: var(--display); font-size: 16px; color: var(--accent) !important; }
.td-last { font-family: var(--display); font-size: 13px; color: var(--text) !important; }
.td-ask      { font-family: var(--display); font-size: 13px; color: var(--chrome) !important; }
.td-estimate { font-family: var(--display); font-size: 14px; color: var(--accent) !important; }
.td-sales    { font-family: var(--display); font-size: 12px; }

/* ── Estimate badge ──────────────────────────────────────────────────────────── */
.est-badge {
  display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 1px 4px; border: 1px solid var(--muted2); color: var(--muted2);
  border-radius: 2px; margin-left: 4px; vertical-align: middle;
}
.stale-badge {
  display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 1px 4px; border: 1px solid var(--muted2); color: var(--muted2);
  border-radius: 2px; vertical-align: middle;
}

/* ── Engine badge ────────────────────────────────────────────────────────────── */
.engine-badge {
  font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted2); padding: 8px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.engine-badge span { color: var(--chrome); }
/* est-badge chrome variant */
.est-badge.chrome { border-color: var(--chrome); color: var(--chrome); }

.v-tag {
  display: inline-block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid; border-radius: 2px;
}
/* .v-* variant classes come from variants.css */

/* ── Right: listing drawer ───────────────────────────────────────────────────── */
.drawer {
  width: 0; overflow: hidden; border-left: 1px solid var(--border);
  background: var(--surf1); transition: width 0.25s ease;
  display: flex; flex-direction: column;
}
.drawer.open { width: 45%; min-width: 400px; }

.drawer-
.drawer-title { font-family: var(--display); font-size: 13px; color: var(--text); line-height: 1.4; }
.drawer-subtitle { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }
.drawer-close {
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 28px; height: 28px; border-radius: 2px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.drawer-close:hover { border-color: var(--text); color: var(--text); }

.drawer-stats {
  display: flex; gap: 24px; padding: 14px 24px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.drawer-stat-value { font-family: var(--display); font-size: 18px; color: var(--accent); }

.drawer-listings { flex: 1; overflow-y: auto; padding: 16px 24px; }

/* ── Listing card ─────────────────────────────────────────────────────────────── */
.listing-card {
  display: flex; gap: 12px; padding: 12px; margin-bottom: 10px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  transition: border-color 0.15s;
}
.listing-card:hover { border-color: var(--muted2); }
.listing-card.flagged { border-color: var(--flag-red) !important; }

.listing-img {
  width: 64px; height: 64px; object-fit: cover; border-radius: 2px; flex-shrink: 0;
  background: var(--surf2);
}
.listing-img-placeholder {
  width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
  background: var(--surf2); border-radius: 2px; flex-shrink: 0; font-size: 24px;
}

.listing-body { flex: 1; min-width: 0; }
.listing-title {
  font-size: 11px; color: var(--text); line-height: 1.4; margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.listing-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.listing-price { font-family: var(--display); font-size: 18px; color: var(--accent); }
.listing-date { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; }
.listing-link {
  font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  text-decoration: none; border: 1px solid var(--border); padding: 2px 7px; border-radius: 2px;
  transition: all 0.15s;
}
.listing-link:hover { color: var(--accent); border-color: var(--accent); }

.listing-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.flag-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: var(--display); font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  padding: 4px 8px; border-radius: 2px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.flag-btn:hover { border-color: var(--flag-red); color: var(--flag-red); }
.flag-btn.flagged { background: var(--flag-red); border-color: var(--flag-red); color: #fff; }

/* ── Loading / empty states ──────────────────────────────────────────────────── */
.loading-wrap { padding: 60px; text-align: center; color: var(--muted); font-family: var(--display); font-size: 11px; letter-spacing: 1px; }
.loading-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s infinite; margin: 0 2px; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }

.empty { padding: 40px; text-align: center; color: var(--muted2); font-family: var(--display); font-size: 11px; letter-spacing: 1px; }

.afa-badge {
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid #ffd700; color: #ffd700;
  border-radius: 2px; font-family: var(--display);
}
.source-badge {
  font-size: 8px; letter-spacing: 1px; color: var(--muted);
  font-family: var(--display);
}
/* ── Scrollbar ───────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Responsive: mobile/tablet (768px) ── */
@media (max-width: 768px) {
  /* Page layout: stack vertically */
  .page { flex-direction: column; height: auto; overflow: visible; }
  .product-list { padding: 16px; overflow-y: visible; }
  .product-list.drawer-open { flex: 1; }

  /* Page header */
  .page-title { font-size: 28px !important; letter-spacing: 2px; }
  .page-sub { font-size: 11px; }
  div[style*="padding: 32px 32px 0"] { padding: 16px 16px 0 !important; }

  /* Search bar: full width */
  .filter-row { flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .filter-row input { width: 100%; box-sizing: border-box; }

  /* Filter chips: wrap, smaller */
  .chip { padding: 5px 10px; font-size: 9px; letter-spacing: 1px; }

  /* Engine badge: smaller */
  .engine-badge { font-size: 9px; padding: 6px 0 10px; }

  /* Table: horizontal scroll wrapper */
  .guide-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .guide-table thead th { font-size: 9px; padding: 0 8px 8px 0; }
  .guide-table td { padding: 8px 8px 8px 0; font-size: 11px; }
  .td-price { font-size: 14px !important; }
  .td-player { font-size: 13px; }
  .td-set { font-size: 9px; }

  /* Hide 30D Avg (col 4) and 30d Sales (col 7) */
  .guide-table thead th:nth-child(4),
  .guide-table tbody td:nth-child(4),
  .guide-table thead th:nth-child(7),
  .guide-table tbody td:nth-child(7) { display: none; }

  /* Drawer: full-width overlay from bottom */
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0;
    width: 100% !important; min-width: 0; z-index: 200;
    height: 0; border-left: none; border-top: 1px solid var(--border);
    transition: height 0.25s ease;
  }
  .drawer.open {
    width: 100% !important; min-width: 0;
    height: 85vh; top: auto;
  }

  /* Drawer internals */
  .drawer-stats { gap: 16px; padding: 12px 16px; }
  .drawer-stat-value { font-size: 16px; }
  .drawer-listings { padding: 12px 16px; }

  /* Listing cards */
  .listing-card { flex-wrap: wrap; }
  .listing-actions { flex-direction: row; width: 100%; justify-content: flex-end; }

  /* General tighter spacing */
  .result-count { font-size: 9px; }
}

/* ── Responsive: small phones (480px) ── */
@media (max-width: 480px) {
  /* Also hide Last Sale (col 5) — keep Player, Variant, Avg Price, Sales */
  .guide-table thead th:nth-child(5),
  .guide-table tbody td:nth-child(5) { display: none; }

  /* Even smaller fonts */
  .page-title { font-size: 24px !important; }
  .guide-table thead th { font-size: 8px; }
  .guide-table td { font-size: 10px; }
  .td-price { font-size: 13px !important; }
  .td-player { font-size: 12px; }
  .td-set { font-size: 8px; }
  .chip { padding: 4px 8px; font-size: 8px; }

  /* Engine badge: hide on very small screens */
  .engine-badge { display: none; }

  /* Drawer fills entire screen */
  .drawer.open { height: 100vh; }
}
</style>

<script>
const SB_URL = 'https://sabzbyuqrondoayhwoth.supabase.co';
const SB_KEY = 'sb_publishable_KAbUO5YvOapq_kWkHqt7BA_UTwrP60s';
const SB_H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function rpc(fn, p={}) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {method:'POST',headers:SB_H,body:JSON.stringify(p)});
  if (!r.ok) throw new Error(`${fn}: ${r.status}`);
  return r.json();
}

async function sbGet(table, qs) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {headers:SB_H});
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

// Paginates automatically — Supabase caps a single request at 1000 rows by default.
async function sbGetAll(table, qs, pageSize = 1000) {
  let all = [], offset = 0;
  while (true) {
    const page = await sbGet(table, `${qs}&limit=${pageSize}&offset=${offset}`);
    all = all.concat(page);
    if (page.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

async function sbInsert(table, row) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...SB_H,'Prefer':'return=minimal'}, body:JSON.stringify(row)
  });
  // Non-blocking: don't throw, just log
  if (!r.ok) console.warn(`sbInsert ${table}:`, r.status);
}

async function sbFetch(table, params) {
  const qs = Object.entries(params).map(([k,v]) => `${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}&order=date.desc`, {headers:SB_H});
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

async function sbPatch(table, match, data) {
  const qs = Object.entries(match).map(([k,v]) => `${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {
    method:'PATCH', headers:{...SB_H,'Prefer':'return=minimal'}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error('PATCH ' + r.status);
}

// ── Figure URL helpers ──────────────────────────────────────────────────────
function _slugPlayer(n) {
  return (n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\./g,'').replace(/[^a-z0-9\s]/g,'').trim().replace(/\s+/g,'_');
}
function _slugSet(n) {
  return (n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');
}
function _normVar(v) {
  const l=(v||'').toLowerCase();
  if(l.includes('fire'))return'fire'; if(l.includes('chrome'))return'chrome';
  if(l.includes('gold'))return'gold'; if(l.includes('emerald'))return'emerald';
  if(l.includes('victory'))return'victory'; if(l.includes('vides'))return'vides';
  if(l.includes('bet'))return'bet-on-women'; if(l.includes('sp'))return'sp';
  return'base';
}
function figureUrl(player, variant, setName) {
  return `assets/figures/${_slugSet(setName)}/${_slugPlayer(player)}_${_normVar(variant)}.png`;
}

function normProduct(r) {
  const setStr = (r.set_name || '').toUpperCase();
  return {
    set: r.set_name, player: r.player, variant: r.variant,
    totalSales: +r.total_sales || 0, avgPrice: +r.avg_price || 0,
    avg30d: +r.avg_30d || 0, sales30d: +r.sales_30d || 0,
    avg90d: +r.avg_90d || 0, sales90d: +r.sales_90d || 0,
    lastSaleDate: r.last_sale_date, lastSalePrice: +r.last_sale_price || 0,
    retail: +r.retail_price || 0,
    multiplier: (r.retail_price && r.avg_price) ? Math.round(+r.avg_price / +r.retail_price * 10) / 10 : 0,
    lowestAsk: 0,
  };
}

const VARIANT_COLORS = {
  Base: 'var(--base)', Victory: 'var(--victory)', Vides: 'var(--vides)',
  Emerald: 'var(--emerald)', Gold: 'var(--gold)', Chrome: 'var(--chrome)',
  Fire: 'var(--fire)', 'Bet On Women': 'var(--bet-on-women)', SP: 'var(--sp)',
};
const VARIANT_ORDER = ['Fire','Chrome','Gold','Emerald','Vides','Victory','Base'];

let allData = null;
let allProducts = [];
let globalEstimates = {};
let globalRefreshed = {};
let activeSet = 'ALL';
let activeVariant = 'ALL';
let sortCol = 'avgPrice';
let sortDir = 'desc';
let selectedProduct = null;

// ── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const [pi, paramsData, setMathData, setsData, gradedSalesData] = await Promise.all([
      rpc('get_price_intelligence'),
      sbGet('engine_params', 'select=*&is_active=eq.true&limit=1'),
      sbGet('set_math', 'select=set_id,player,variant,population'),
      sbGet('sets', 'select=id,name,league,active&active=eq.true'),
      sbGet('sales', 'select=player,variant,price,date&afa_grade=not.is.null&status=neq.invalid'),
    ]);
    const engineParams = (paramsData || [])[0] || null;
    allProducts = pi.filter(r => r.player && r.player !== 'Unknown').map(normProduct);

    // Snapshot raw PI averages before normalization — used for display only.
    // applyGradingNorm zeros avgPrice when all sales are graded so the engine
    // doesn't treat a graded-only price as an ungraded comp. But the guide
    // table should still show the real (graded) average for those combos.
    allProducts.forEach(p => {
      p.rawAvgPrice = p.avgPrice;
      p.rawAvg30d   = p.avg30d;
      p.rawAvg90d   = p.avg90d;
    });

    // Normalize product averages to remove graded-sale inflation so the
    // engine uses accurate ungraded-equivalent prices when building comps.
    const gradedNormMap = buildGradedNormMap(gradedSalesData || []);
    applyGradingNorm(allProducts, gradedNormMap);

    // Build set_id → name and league lookups
    const setIdToName = {};
    (setsData || []).forEach(s => { setIdToName[s.id] = s.name; });
    const setLeagueMap = {};
    (setsData || []).forEach(s => { if (s.name) setLeagueMap[s.name] = (s.league || '').toUpperCase(); });

    // Build set_math: set_name → [{player, variant, population}]
    const setMath = {};
    (setMathData || []).forEach(row => {
      const setName = setIdToName[row.set_id];
      if (!setName || !row.player || row.player === 'Unknown') return;
      if (!setMath[setName]) setMath[setName] = [];
      setMath[setName].push({ player: row.player, variant: row.variant, population: +row.population });
    });

    // Set allData for estimate-engine.js
    allData = { products: allProducts, setMath, setLeagueMap, signalMap: {}, activeWeights: engineParams };

    // Pre-compute v2 estimates for all sets at boot
    const setNames = [...new Set(allProducts.map(p => p.set).filter(Boolean))];
    for (const setName of setNames) {
      const setProducts = allProducts.filter(p => p.set === setName);
      const { estimates, refreshedEstimates } = buildEstimates(setName, setProducts, engineParams);
      Object.assign(globalEstimates, estimates);
      Object.assign(globalRefreshed, refreshedEstimates);
    }

    // Show engine version tag
    const engTag = document.getElementById('engine-tag');
    if (engTag) engTag.textContent = engineParams?.tag || (engineParams ? `v${engineParams.version}` : 'no params');

    // Use is_active=eq.true — avoids the scraped_at=eq.(latest) bug where
    // incremental runs add a small batch with a newer timestamp, making the
    // bulk of active listings invisible to the lowest-ask map.
    const listings = await sbGetAll('listings',
      'select=set_name,player,variant,ask_price&is_active=eq.true');
    const lowestAskMap = {};
    listings.forEach(l => {
      if (!l.player || l.player === 'Unknown' || !l.ask_price) return;
      const k = `${l.set_name}|||${l.player}|||${l.variant}`;
      if (!lowestAskMap[k] || l.ask_price < lowestAskMap[k]) lowestAskMap[k] = l.ask_price;
    });
    allProducts.forEach(p => {
      p.lowestAsk = lowestAskMap[`${p.set}|||${p.player}|||${p.variant}`] || 0;
    });

    buildSetChips(setsData || []);
    buildVariantChips();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">failed to load data: ' + e.message + '</div>';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const urlPlayer = params.get('player');
  if (urlPlayer) {
    const searchEl = document.getElementById('search-input');
    if (searchEl) searchEl.value = urlPlayer;
  }
  applyFilters();
  if (urlPlayer) {
    const match = allProducts.find(p =>
      p.player.toLowerCase() === urlPlayer.toLowerCase() && p.variant === 'Base'
    ) || allProducts.find(p =>
      p.player.toLowerCase() === urlPlayer.toLowerCase()
    );
    if (match) setTimeout(() => openDrawer(match), 100);
  }
});

// ── Set name shortener ────────────────────────────────────────────────────────
function shortSetName(n) {
  return n
    .replace('Game Face', '')
    .replace('2024-25', '24-25')
    .replace('2025-26', '25-26')
    .replace('2026-27', '26-27')
    .replace(/\b(20\d\d)\b/, (m, y) => "'" + y.slice(2))
    .trim();
}

// ── Variant name shortener ────────────────────────────────────────────────────
function shortVariantName(v) {
  return v === 'Bet On Women' ? 'BET' : v;
}

// ── Set chips ─────────────────────────────────────────────────────────────────
function buildSetChips(setsData) {
  const el = document.getElementById('set-chips');
  const active = (setsData || []).filter(s => s.active !== false && s.name);
  active.sort((a, b) => shortSetName(b.name).localeCompare(shortSetName(a.name)));
  el.innerHTML = `<button class="chip active" data-set="ALL" onclick="setActiveSet(this)">ALL</button>` +
    active.map(s => `<button class="chip" data-set="${s.name}" onclick="setActiveSet(this)">${shortSetName(s.name)}</button>`).join('');
}

// ── Variant chips ────────────────────────────────────────────────────────────
function buildVariantChips() {
  // Order by total population across all sets (lowest → highest), Fire always first
  const variantPop = {};
  Object.values(allData?.setMath || {}).forEach(rows => {
    rows.forEach(r => {
      if (r.variant) {
        variantPop[r.variant] = (variantPop[r.variant] || 0) + (+r.population || 0);
      }
    });
  });
  const variants = [...new Set(allProducts.map(p => p.variant).filter(Boolean))];
  variants.sort((a, b) => {
    if (a === 'Fire') return -1;
    if (b === 'Fire') return 1;
    return (variantPop[a] || 0) - (variantPop[b] || 0);
  });
  const el = document.getElementById('variant-chips');
  el.innerHTML = ['ALL', ...variants].map(v => `
    <button class="chip ${v==='ALL'?'active':''}" data-variant="${v}" onclick="setVariant(this)"
      style="${v !== 'ALL' ? 'color:' + (VARIANT_COLORS[v]||'#888') + ';border-color:' + (VARIANT_COLORS[v]||'#888') : ''}"
    >${v === 'ALL' ? 'ALL' : shortVariantName(v)}</button>
  `).join('');
}

// ── Filters ──────────────────────────────────────────────────────────────────
function setActiveSet(btn) {
  document.querySelectorAll('#set-chips .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSet = btn.dataset.set;
  applyFilters();
}

function setVariant(btn) {
  document.querySelectorAll('#variant-chips .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeVariant = btn.dataset.variant;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();

  let filtered = allProducts.filter(p => {
    if (activeSet !== 'ALL' && p.set !== activeSet) return false;
    if (activeVariant !== 'ALL' && p.variant !== activeVariant) return false;
    if (q && !`${p.player} ${p.set} ${p.variant}`.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let av = a[sortCol] || 0;
    let bv = b[sortCol] || 0;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return sortDir === 'desc' ? (bv > av ? 1 : -1) : (av > bv ? 1 : -1);
  });

  document.getElementById('result-count').textContent = filtered.length + ' products';
  renderTable(filtered);
}

// ── Table ────────────────────────────────────────────────────────────────────
function renderTable(products) {
  const cols = [
    { key: 'player',        label: 'Player',          },
    { key: 'variant',       label: 'Variant',         },
    { key: 'avgPrice',      label: 'Avg. Price – All' },
    { key: 'avg30d',        label: '30D Avg',         },
    { key: 'lastSalePrice', label: 'Last Sale',        },
    { key: 'totalSales',    label: 'Sales',            },
    { key: 'sales30d',      label: '30d Sales',        },
  ];

  const thead = cols.map(c => {
    const cls = sortCol === c.key ? ('sort-' + sortDir) : '';
    return `<th class="${cls}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join('');

  const tbody = products.map(p => {
    const vClass = 'v-' + (p.variant||'base').toLowerCase();
    const isSelected = selectedProduct &&
      selectedProduct.set === p.set &&
      selectedProduct.player === p.player &&
      selectedProduct.variant === p.variant;

    return `<tr class="${isSelected ? 'selected' : ''}" onclick="openDrawer(${JSON.stringify(p).replace(/"/g, '&quot;')})">
      <td>
        <div class="td-player">${p.player}</div>
        <div class="td-set">${p.set}</div>
      </td>
      <td><span class="v-tag ${vClass}">${p.variant}</span></td>
      <td class="td-price">${(p.rawAvgPrice || p.avgPrice) ? '$' + Math.round(p.rawAvgPrice || p.avgPrice) : '—'}</td>
      <td class="td-price">${(p.rawAvg30d || p.avg30d) ? '$' + Math.round(p.rawAvg30d || p.avg30d) : '—'}</td>
      <td class="td-last">${p.lastSalePrice ? '$' + Math.round(p.lastSalePrice) : '—'}</td>
      <td class="td-sales">${p.totalSales || 0}</td>
      <td class="td-sales">${p.sales30d || 0}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table class="guide-table">
      <thead><tr>${thead}</tr></thead>
      <tbody>${tbody || '<tr><td colspan="7"><div class="empty">no products match</div></td></tr>'}</tbody>
    </table>`;
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = 'desc';
  }
  applyFilters();
}

// ── Drawer ───────────────────────────────────────────────────────────────────
async function openDrawer(product) {
  selectedProduct = product;
  applyFilters();

  const vClass = 'v-' + (product.variant||'base').toLowerCase();
  document.getElementById('drawer-title').innerHTML =
    `${product.player} <span class="v-tag ${vClass}" style="margin-left:6px">${product.variant}</span>`;
  document.getElementById('drawer-subtitle').textContent = product.set;

  document.getElementById('drawer-stats').innerHTML = `
    <div><div class="drawer-stat-label">Avg Price</div><div class="drawer-stat-value">${(product.rawAvgPrice || product.avgPrice) ? '$' + Math.round(product.rawAvgPrice || product.avgPrice) : '—'}</div></div>
    <div><div class="drawer-stat-label">Last Sale</div><div class="drawer-stat-value">${product.lastSalePrice ? '$' + Math.round(product.lastSalePrice) : '—'}</div></div>
    <div><div class="drawer-stat-label">Total Sales</div><div class="drawer-stat-value">${product.totalSales || 0}</div></div>
    <div><div class="drawer-stat-label">30d Sales</div><div class="drawer-stat-value">${product.sales30d || 0}</div></div>
  `;

  // ── V2 Estimate section ────────────────────────────────────────────────────
  const _k = `${product.set}|||${product.player}|||${product.variant}`;
  const _ref = globalRefreshed[_k];
  const _est = globalEstimates[_k];
  let estimateHtml = '';
  if (_ref) {
    estimateHtml = `
      <div style="padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">
          V2 Estimate <span class="est-badge chrome">BLEND</span>
        </div>
        <div style="font-family:var(--display);font-size:22px;color:var(--accent);margin-bottom:10px">
          $${_ref.price.toLocaleString()}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">Own price</span>
            <span>$${_ref.ownPrice.toLocaleString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">Data freshness</span>
            <span>${_ref.freshness}%</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">Pure model est.</span>
            <span>$${_ref.modelEstimate.toLocaleString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">Confidence</span>
            <span>${_ref.confidence}</span>
          </div>
        </div>
      </div>`;
  } else if (_est) {
    estimateHtml = `
      <div style="padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">
          V2 Estimate <span class="est-badge">MODEL</span>
        </div>
        <div style="font-family:var(--display);font-size:22px;color:var(--accent);margin-bottom:10px">
          $${_est.price.toLocaleString()}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px">
          <span style="color:var(--muted)">Confidence</span>
          <span>${_est.confidence}</span>
        </div>
      </div>`;
  }
  document.getElementById('drawer-estimate').innerHTML = estimateHtml;

  document.getElementById('drawer-listings').innerHTML = '<div class="loading-wrap"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('product-list').classList.add('drawer-open');

  try {
    const rawListings = await rpc('get_sales_by_combo', {
      p_set_name: product.set, p_player: product.player, p_variant: product.variant
    });
    // Normalize listing fields
    const listings = rawListings.map(l => ({
      id: l.id, price: +l.price || 0, date: l.date,
      image: l.image_url, url: l.ebay_url, afa: l.afa_grade,
      flagged: l.flagged, title: l.title || '',
      set: l.set_name, player: l.player, variant: l.variant,
    }));
    if (!listings.length) {
      document.getElementById('drawer-listings').innerHTML = '<div class="empty">no listings found</div>';
    } else {
      document.getElementById('drawer-listings').innerHTML = listings.map(l => renderListingCard(l, product)).join('');
    }
  } catch(e) {
    document.getElementById('drawer-listings').innerHTML = '<div class="empty">failed to load listings</div>';
  }
}

function closeDrawer() {
  selectedProduct = null;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('product-list').classList.remove('drawer-open');
  applyFilters();
}

// ── Listing card ─────────────────────────────────────────────────────────────
function renderListingCard(listing, product) {
  const saleId = listing.id;
  const flagClass = listing.flagged ? 'flagged' : '';
  const flagLabel = listing.flagged ? '⚑ flagged' : 'flag';
  const flagBtnClass = listing.flagged ? 'flagged' : '';

  const figSrc = product ? figureUrl(product.player, product.variant, product.set) : '';
  let imgHtml;
  if (listing.image) {
    imgHtml = `<img class="listing-img" src="${listing.image}" alt="" loading="lazy"
       onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="listing-img-placeholder" style="display:none">
         ${figSrc ? `<img class="listing-img" src="${figSrc}" alt="" style="object-fit:contain;background:#111" onerror="this.parentElement.textContent='👻'">` : '👻'}
       </div>`;
  } else {
    imgHtml = figSrc
      ? `<img class="listing-img" src="${figSrc}" alt="" loading="lazy" style="object-fit:contain;background:#111"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="listing-img-placeholder" style="display:none">👻</div>`
      : `<div class="listing-img-placeholder">👻</div>`;
  }

  const dateStr = listing.date
    ? new Date(listing.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
    : '—';

  const linkHtml = listing.url
    ? `<a class="listing-link" href="${listing.url}" target="_blank" rel="noopener">↗ view listing</a>`
    : '';

  return `<div class="listing-card ${flagClass}" id="card-${saleId}">
    ${imgHtml}
    <div class="listing-body">
      <div class="listing-title">${listing.title}</div>
      <div class="listing-meta">
        <span class="listing-price">$${Math.round(listing.price)}</span>
        <span class="listing-date">${dateStr}</span>
        ${listing.afa ? `<span class="afa-badge">🏆 ${listing.afa}</span>` : ''}
        ${listing.source && listing.source !== 'eBay' ? `<span class="source-badge">${listing.source}</span>` : ''}
        ${linkHtml}
      </div>
    </div>
    <div class="listing-actions">
      <button class="flag-btn ${flagBtnClass}" onclick="toggleFlag(event, '${saleId}', ${listing.flagged})">${flagLabel}</button>
    </div>
  </div>`;
}

// ── Estimate helpers (v2 engine) ──────────────────────────────────────────────

function getEstimateValue(product) {
  const k = `${product.set}|||${product.player}|||${product.variant}`;
  return (globalRefreshed[k]?.price) || (globalEstimates[k]?.price) || product.avgPrice || 0;
}

function renderEstimateCell(product) {
  const k   = `${product.set}|||${product.player}|||${product.variant}`;
  const ref = globalRefreshed[k];
  const est = globalEstimates[k];
  if (ref) return `$${ref.price.toLocaleString()}<span class="est-badge chrome">BLEND</span>`;
  if (est) return `$${est.price.toLocaleString()}<span class="est-badge">MODEL</span>`;
  if (product.avgPrice) return `$${Math.round(product.avgPrice).toLocaleString()}`;
  return '—';
}

// ── Flagging ─────────────────────────────────────────────────────────────────
async function toggleFlag(event, saleId, currentlyFlagged) {
  event.stopPropagation();
  const newFlagged = !currentlyFlagged;

  // Optimistic UI update
  const card = document.getElementById('card-' + saleId);
  const btn = card.querySelector('.flag-btn');
  if (newFlagged) {
    card.classList.add('flagged'); btn.classList.add('flagged'); btn.textContent = '⚑ flagged';
  } else {
    card.classList.remove('flagged'); btn.classList.remove('flagged'); btn.textContent = 'flag';
  }

  try {
    await sbPatch('sales', {id: saleId}, {flagged: newFlagged});
  } catch(e) {
    // Revert on error
    if (newFlagged) {
      card.classList.remove('flagged'); btn.classList.remove('flagged'); btn.textContent = 'flag';
    } else {
      card.classList.add('flagged'); btn.classList.add('flagged'); btn.textContent = '⚑ flagged';
    }
    console.error('Flag failed:', e);
  }
}
