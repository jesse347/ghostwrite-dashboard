<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ghostladder · sales feed</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:      #080808;
  --s1:      #0f0f0f;
  --s2:      #161616;
  --s3:      #1e1e1e;
  --border:  #222;
  --accent:  #e8ff47;
  --text:    #efefef;
  --muted:   #555;
  --muted2:  #888;
  --mono:    'DM Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --serif:   'Instrument Serif', serif;
  --green:   #3ddc84;
  --red:     #ff4455;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); min-height: 100vh; }
body { color: var(--text); font-family: var(--mono); font-size: 12px; overflow-x: hidden; }

/* Grain */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}

/* ── Page layout ── */
.page { max-width: 1400px; margin: 0 auto; padding: 40px 32px 80px; }

/* ── Page header ── */
.page-eyebrow {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.page-title {
  font-family: var(--display); font-size: 52px; letter-spacing: 2px;
  line-height: 0.95; margin-bottom: 8px;
}
.page-title em { color: var(--accent); font-style: normal; }
.page-sub {
  font-family: var(--serif); font-style: italic; font-size: 14px;
  color: var(--muted2); margin-bottom: 32px;
}

/* ── Controls bar ── */
.controls-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.filter-group { display: flex; gap: 3px; }
.chip {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 5px 13px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.chip:hover  { border-color: var(--muted2); color: var(--text); }
.chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
.controls-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.controls-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.count-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.count-label strong { color: var(--text); font-weight: 400; }

/* ── Feed grid ── */
.feed-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

/* ── Sale card shell ── */
.sale-card {
  aspect-ratio: 4 / 5;
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  display: block;
}
.sale-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}

/* Base dark fill */
.card-base   { position: absolute; inset: 0; background: #07090e; }
/* Variant gradient blob (inline style applied via JS) */
.card-glow   { position: absolute; inset: 0; }
/* Geometric mandala SVG */
.card-geo    { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.07; }
/* Vignette to pull edges dark */
.card-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 38%, transparent 28%, rgba(0,0,0,0.55) 100%);
}
/* Floor shadow under figure */
.card-floor {
  position: absolute; bottom: 30%; left: 5%; right: 5%; height: 4%;
  background: rgba(0,0,0,0.4);
  filter: blur(12px);
  border-radius: 50%;
}

/* ── Content layer ── */
.card-inner {
  position: relative; z-index: 2;
  height: 100%; display: flex; flex-direction: column;
}

/* Top accent line */
.card-top-line {
  height: 3px;
  background: linear-gradient(90deg, #0d5c35, var(--green), #0d5c35);
  flex-shrink: 0;
}

/* Header row — logo | stretchy green rule | headline */
.card-header {
  display: flex; align-items: center;
  padding: 7px 12px 6px; flex-shrink: 0; gap: 8px;
}
.card-logo { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.card-logo-g {
  font-family: var(--display); font-size: 16px; color: #fff; line-height: 1;
  border: 1.5px solid rgba(255,255,255,0.5);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.card-logo-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.3); }
.card-logo-name {
  display: flex; flex-direction: column;
  font-family: var(--display); font-size: 6.5px;
  letter-spacing: 2.5px; color: rgba(255,255,255,0.8); line-height: 1.2;
}
/* Stretchy green rule between logo and headline */
.card-header-rule {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(13,92,53,0.6), var(--green), rgba(13,92,53,0.6));
}
.card-headline {
  font-family: var(--serif); font-style: italic;
  font-size: 16px; color: rgba(255,255,255,0.9);
  line-height: 1.1; flex-shrink: 0; white-space: nowrap;
}
.card-headline.is-record {
  font-family: var(--display); font-style: normal;
  font-size: 13px; letter-spacing: 2.5px; color: var(--accent);
}

/* Separator line below header */
.card-header-sep {
  height: 2px; flex-shrink: 0;
  background: linear-gradient(90deg, #0d5c35, var(--green), #0d5c35);
}

/* Record ribbon */
.card-ribbon {
  position: absolute; top: 38px; right: -26px;
  background: var(--accent); color: #000;
  font-family: var(--display); font-size: 8px; letter-spacing: 2px;
  padding: 3px 32px; transform: rotate(45deg);
  z-index: 10; pointer-events: none;
}

/* Figure image area */
.card-figure-area {
  flex: 1; position: relative;
  overflow: visible;
  display: flex; align-items: center; justify-content: center;
}
.card-figure {
  /* Absolute positioning so height % reliably resolves against figure-area.
     bottom: -60px aligns feet with the inner green price line
     (card-bottom-row ~46px + padding-top 8px + price-line margin 6px = 60px) */
  position: absolute;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  height: calc(100% + 60px);
  width: auto;
  max-width: 90%;
  display: block;
  object-fit: contain; object-position: bottom center;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.75));
  transition: transform 0.3s;
}
.sale-card:hover .card-figure {
  transform: translateX(-50%) translateY(-6px) scale(1.02);
}

/* Fallback: no image */
.card-no-figure {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; gap: 6px;
}
.card-no-figure .nf-player {
  font-family: var(--display); font-size: 28px; letter-spacing: 2px;
  text-align: center; color: rgba(255,255,255,0.7); line-height: 1;
}
.card-no-figure .nf-variant {
  font-family: var(--display); font-size: 13px; letter-spacing: 3px; color: var(--accent);
}

/* Bottom section — figure bleeds through, gradient fades for readability */
.card-bottom {
  flex-shrink: 0; position: relative; z-index: 3;
  padding: 8px 12px 10px;
  /* Opaque at the very bottom (desc + price line), fades to transparent at top
     so the figure shows through behind the date/price row */
  background: linear-gradient(to top, rgba(4,6,12,0.96) 28%, rgba(4,6,12,0.55) 65%, transparent 100%);
}
/* Top row: meta (left) + price (right) */
.card-bottom-row {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
  margin-bottom: 0;
}
/* Date + platform */
.card-meta { flex-shrink: 0; }
.card-date-label {
  font-size: 7px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  color: rgba(255,255,255,0.5); margin-bottom: 1px;
}
.card-date-value {
  font-family: var(--mono); font-size: 10px;
  color: rgba(255,255,255,0.8); letter-spacing: 0.3px; margin-bottom: 7px;
}
/* eBay badge */
.card-ebay {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; padding: 3px 9px; border-radius: 2px;
}
.card-ebay-text {
  font-size: 12px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(90deg, #e53238 25%, #f56a00 25% 50%, #0064d2 50% 75%, #86b817 75%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
/* Private badge */
.card-private {
  display: inline-flex; align-items: center; justify-content: center;
  border: 1.5px solid rgba(255,255,255,0.35); padding: 2px 10px; border-radius: 2px;
}
.card-private span {
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 0.5px;
}
/* Price */
.card-price {
  font-family: var(--display); font-size: 40px; letter-spacing: 1px; line-height: 1;
  background: linear-gradient(145deg, #f7e98e 0%, #d4a017 35%, #f7e98e 65%, #c08c0c 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: right; flex-shrink: 0;
}
/* Full-width green rule between price row and description */
.card-price-line {
  height: 2px;
  background: linear-gradient(90deg, rgba(13,92,53,0.4), var(--green), rgba(13,92,53,0.4));
  margin: 6px 0 5px;
}
/* Description */
.card-desc {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2px;
  color: rgba(255,255,255,0.5); line-height: 1.5; text-align: center;
}
.card-desc strong { color: rgba(255,255,255,0.82); font-weight: 400; }

/* Bottom accent line */
.card-bottom-line {
  height: 4px; flex-shrink: 0;
  background: linear-gradient(90deg, #0d5c35, var(--green), #0d5c35);
}

/* ── States ── */
.feed-loading {
  grid-column: 1/-1; text-align: center; padding: 100px 20px;
  font-family: var(--display); font-size: 32px; letter-spacing: 4px; color: var(--muted);
}
.feed-empty {
  grid-column: 1/-1; text-align: center; padding: 80px 20px;
  color: var(--muted); font-size: 11px; letter-spacing: 1px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .page { padding: 20px 16px 60px; }
  .feed-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .page-title { font-size: 36px; }
}
</style>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Supabase
// ─────────────────────────────────────────────────────────────────────────────
const SB_URL = 'https://sabzbyuqrondoayhwoth.supabase.co';
const SB_KEY = 'sb_publishable_KAbUO5YvOapq_kWkHqt7BA_UTwrP60s';
const SB_H   = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

async function rpc(fn, p = {}) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST', headers: SB_H, body: JSON.stringify(p)
  });
  if (!r.ok) throw new Error(`RPC ${fn}: ${r.status}`);
  return r.json();
}

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let allCards = [];
let filterVariant = 'all';
let filterType    = 'all';

// ─────────────────────────────────────────────────────────────────────────────
// Variant config — gradient + print run per variant
// ─────────────────────────────────────────────────────────────────────────────
const VARIANTS = {
  base:    { label: 'Base',    run: '/1000',
    glow: 'radial-gradient(circle at 25% 68%, rgba(28,65,200,0.55) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(0,155,155,0.45) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(95,25,158,0.45) 0%, transparent 48%)' },
  victory: { label: 'Victory', run: '/50',
    glow: 'radial-gradient(circle at 25% 68%, rgba(70,20,195,0.55) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(115,0,195,0.42) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(158,25,110,0.42) 0%, transparent 48%)' },
  emerald: { label: 'Emerald', run: '/25',
    glow: 'radial-gradient(circle at 25% 68%, rgba(0,118,55,0.6) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(0,175,115,0.48) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(25,95,25,0.48) 0%, transparent 48%)' },
  gold:    { label: 'Gold',    run: '/10',
    glow: 'radial-gradient(circle at 25% 68%, rgba(175,108,0,0.62) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(208,158,0,0.48) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(148,68,0,0.48) 0%, transparent 48%)' },
  chrome:  { label: 'Chrome',  run: '/5',
    glow: 'radial-gradient(circle at 25% 68%, rgba(55,108,178,0.55) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(128,168,198,0.42) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(65,88,138,0.42) 0%, transparent 48%)' },
  fire:    { label: 'Fire',    run: '/1',
    glow: 'radial-gradient(circle at 25% 68%, rgba(198,28,0,0.65) 0%, transparent 52%), radial-gradient(circle at 78% 22%, rgba(208,108,0,0.52) 0%, transparent 44%), radial-gradient(circle at 62% 88%, rgba(158,0,0,0.52) 0%, transparent 48%)' },
};

// Geometric mandala SVG (flower-of-life pattern)
const GEO_SVG = `<svg class="card-geo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <g fill="none" stroke="white" stroke-width="0.75">
    <circle cx="200" cy="215" r="88"/><circle cx="200" cy="127" r="88"/>
    <circle cx="276" cy="171" r="88"/><circle cx="276" cy="259" r="88"/>
    <circle cx="200" cy="303" r="88"/><circle cx="124" cy="259" r="88"/>
    <circle cx="124" cy="171" r="88"/><circle cx="200" cy="39"  r="88"/>
    <circle cx="352" cy="127" r="88"/><circle cx="352" cy="303" r="88"/>
    <circle cx="200" cy="391" r="88"/><circle cx="48"  cy="303" r="88"/>
    <circle cx="48"  cy="127" r="88"/>
  </g>
</svg>`;

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function slugify(name) {
  return (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip accents (é→e)
    .replace(/\./g, '')                               // remove periods (Jr.)
    .replace(/[^a-z0-9\s]/g, '')
    .trim().replace(/\s+/g, '_');
}

function normalizeVariant(v) {
  if (!v) return '';
  const l = v.toLowerCase();
  if (l.includes('fire'))    return 'fire';
  if (l.includes('chrome'))  return 'chrome';
  if (l.includes('gold'))    return 'gold';
  if (l.includes('emerald')) return 'emerald';
  if (l.includes('victory')) return 'victory';
  if (l.includes('base'))    return 'base';
  return l.replace(/[^a-z0-9]/g, '_');
}

function slugifySet(name) {
  // "MLB 2025 GAME FACE" → "mlb-2025-game-face"
  return (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim().replace(/\s+/g, '-');
}
function figureUrl(player, variant, setName) {
  const file = `${slugify(player)}_${normalizeVariant(variant)}.png`;
  const setSlug = slugifySet(setName);
  return setSlug
    ? `assets/figures/${setSlug}/${file}`
    : `assets/figures/${file}`;   // fallback for older data
}

function fmt$(v) {
  if (!v && v !== 0) return '—';
  return '$' + Math.round(v).toLocaleString();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T12:00:00')
    .toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    .toUpperCase();
}

// ─────────────────────────────────────────────────────────────────────────────
// Headline generation
// ─────────────────────────────────────────────────────────────────────────────
function headline(sale, type) {
  const vInfo = VARIANTS[normalizeVariant(sale.variant)];
  const vLabel = vInfo ? vInfo.label : sale.variant;
  if (type === 'record') {
    if (sale.price >= 1000) return `${sale.player} ${vLabel} Breaks Record`;
    return 'New All-Time High';
  }
  if (type === 'notable') return 'Eye-catching Sale';
  return 'Recent Sale';
}

// ─────────────────────────────────────────────────────────────────────────────
// Classify & enrich sales
// ─────────────────────────────────────────────────────────────────────────────
function classifySales(sales, piMap) {
  // Build all-time-high map from the full dataset
  const athMap = {};
  sales.forEach(s => {
    if (!s.price || !s.player || !s.variant) return;
    const k = `${s.player}__${s.variant}`;
    if (!athMap[k] || +s.price > athMap[k]) athMap[k] = +s.price;
  });

  return sales.map(s => {
    if (!s.price || !s.player) return null;
    const k    = `${s.player}__${s.variant}`;
    const ath  = athMap[k] || 0;
    const pi   = piMap[k]  || {};
    const avg  = pi.avg_price || 0;
    const price = +s.price;
    let type;
    if (ath > 0 && price >= ath) {
      type = 'record';
    } else if ((avg > 0 && price >= avg * 1.5) || price >= 300) {
      type = 'notable';
    } else {
      type = 'regular';
    }
    const vnorm = normalizeVariant(s.variant);
    return {
      player:   s.player,
      variant:  s.variant,
      vnorm,
      price,
      date:     s.date,
      setName:  s.set_name || '',
      ebayUrl:  s.ebay_url || '',
      type,
      headline: headline(s, type),
    };
  }).filter(Boolean);
}

// ─────────────────────────────────────────────────────────────────────────────
// Render a single card
// ─────────────────────────────────────────────────────────────────────────────
function renderCard(s) {
  const vInfo    = VARIANTS[s.vnorm] || { label: s.variant || '', run: '', glow: '' };
  const printRun = vInfo.run ? ` ${vInfo.run}` : '';
  const imgSrc   = figureUrl(s.player, s.variant, s.setName);
  const isRecord = s.type === 'record';
  const setLine  = s.setName ? `${s.setName}<br>` : '';
  const linkAttr = s.ebayUrl ? `href="${s.ebayUrl}" target="_blank" rel="noopener"` : '';
  const platformBadge = s.ebayUrl
    ? `<div class="card-ebay"><span class="card-ebay-text">ebay</span></div>`
    : `<div class="card-private"><span>Private</span></div>`;

  return `<a class="sale-card" ${linkAttr} data-vnorm="${s.vnorm}" data-type="${s.type}">
  <div class="card-base"></div>
  <div class="card-glow" style="background:${vInfo.glow}"></div>
  ${GEO_SVG}
  <div class="card-vignette"></div>
  <div class="card-floor"></div>
  ${isRecord ? '<div class="card-ribbon">RECORD</div>' : ''}

  <div class="card-inner">
    <div class="card-top-line"></div>

    <div class="card-header">
      <div class="card-logo">
        <div class="card-logo-g">G</div>
        <div class="card-logo-divider"></div>
        <div class="card-logo-name"><span>GHOST</span><span>LADDER</span></div>
      </div>
      <div class="card-header-rule"></div>
      <div class="card-headline ${isRecord ? 'is-record' : ''}">${s.headline}</div>
    </div>
    <div class="card-header-sep"></div>

    <div class="card-figure-area">
      <img
        class="card-figure"
        src="${imgSrc}"
        alt="${s.player} ${vInfo.label}"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <div class="card-no-figure">
        <div class="nf-player">${s.player.toUpperCase()}</div>
        <div class="nf-variant">${vInfo.label.toUpperCase()}</div>
      </div>
    </div>

    <div class="card-bottom">
      <div class="card-bottom-row">
        <div class="card-meta">
          <div class="card-date-label">Date Sold:</div>
          <div class="card-date-value">${fmtDate(s.date)}</div>
          ${platformBadge}
        </div>
        <div class="card-price">${fmt$(s.price)}</div>
      </div>
      <div class="card-price-line"></div>
      <div class="card-desc">${setLine}<strong>${s.player} ${vInfo.label}${printRun}</strong></div>
    </div>

    <div class="card-bottom-line"></div>
  </div>
</a>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Render grid
// ─────────────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('feed-grid');
  const cards = allCards.filter(s => {
    if (filterVariant !== 'all' && s.vnorm    !== filterVariant) return false;
    if (filterType    !== 'all' && s.type     !== filterType)    return false;
    return true;
  });
  document.getElementById('card-count').textContent = cards.length;
  grid.innerHTML = cards.length
    ? cards.map(renderCard).join('')
    : '<div class="feed-empty">No sales match the current filters.</div>';
}

// ─────────────────────────────────────────────────────────────────────────────
// Filter controls
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(dim, val, btn) {
  if (dim === 'variant') {
    filterVariant = val;
    document.querySelectorAll('#variant-filters .chip').forEach(b => b.classList.remove('active'));
  } else {
    filterType = val;
    document.querySelectorAll('#type-filters .chip').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  renderGrid();
}

// ─────────────────────────────────────────────────────────────────────────────
// Load
// ─────────────────────────────────────────────────────────────────────────────
async function loadFeed() {
  try {
    const [sales, pi] = await Promise.all([
      rpc('get_recent_sales', { limit_rows: 500 }),
      rpc('get_price_intelligence'),
    ]);

    // Build PI lookup: "player__variant" → pi row
    const piMap = {};
    (pi || []).forEach(r => {
      if (r.player && r.variant) piMap[`${r.player}__${r.variant}`] = r;
    });

    // Classify, then sort: records → notable → regular, each group by date desc
    const typeRank = { record: 0, notable: 1, regular: 2 };
    allCards = classifySales(sales || [], piMap).sort((a, b) => {
      if (typeRank[a.type] !== typeRank[b.type]) return typeRank[a.type] - typeRank[b.type];
      return new Date(b.date || 0) - new Date(a.date || 0);
    });

    renderGrid();
  } catch (e) {
    console.error('Feed error:', e);
    document.getElementById('feed-grid').innerHTML =
      `<div class="feed-empty">Error loading feed: ${e.message}</div>`;
  }
}

loadFeed();
</script>
</body>
</html>
